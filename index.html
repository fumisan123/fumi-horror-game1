qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqo="; 

    let scene, camera, renderer, controls, enemy, listener, positionalAudio;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let velocity = new THREE.Vector3();
    let prevTime = performance.now();

    function log(msg) {
        console.log(msg);
        document.getElementById('status-log').innerText += msg + "\n";
    }

    document.getElementById('instructions').addEventListener('click', () => {
        if (!scene) init();
        
        // 【重要】ブラウザのブロックを解除
        const context = THREE.AudioContext.getContext();
        if (context.state === 'suspended') {
            context.resume().then(() => log("Audio Context Resumed"));
        }
        
        controls.lock();
    });

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.Fog(0x000000, 10, 80);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0);

        listener = new THREE.AudioListener();
        camera.add(listener);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.PointerLockControls(camera, document.body);
        controls.addEventListener('lock', () => {
            document.getElementById('instructions').style.display = 'none';
            // ロックした瞬間に再生を試みる
            if (positionalAudio && !positionalAudio.isPlaying) {
                positionalAudio.play();
                log("Audio Play Triggered");
            }
        });

        scene.add(new THREE.AmbientLight(0x444444));
        const torch = new THREE.SpotLight(0xffffff, 4.0, 80, 0.8, 0.5, 1);
        camera.add(torch);
        torch.target.position.z = -1;
        camera.add(torch.target);
        scene.add(camera);

        // 地面
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x1a2a1a }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 敵
        const texture = new THREE.TextureLoader().load(HORROR_FACE_BASE64);
        enemy = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
        enemy.scale.set(5, 5, 1);
        enemy.position.set(10, 2.5, 40);
        scene.add(enemy);

        // --- 音声ロード処理 (強化版) ---
        if (SCREAM_AUDIO_BASE64.length > 100) {
            positionalAudio = new THREE.PositionalAudio(listener);
            const audioLoader = new THREE.AudioLoader();
            
            log("Loading Audio...");
            audioLoader.load(SCREAM_AUDIO_BASE64, (buffer) => {
                log("Audio Buffer Loaded!");
                positionalAudio.setBuffer(buffer);
                positionalAudio.setRefDistance(15); // 聞こえる範囲を広げました
                positionalAudio.setLoop(true);
                positionalAudio.setVolume(1.0);
            }, undefined, (err) => {
                log("Audio Error: " + err);
            });
            enemy.add(positionalAudio);
        } else {
            log("Audio Data too short!");
        }

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        if (controls.isLocked) {
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.x -= velocity.x * 10.0 * delta;
            if (moveForward) velocity.z -= 60.0 * delta;
            if (moveBackward) velocity.z += 60.0 * delta;
            if (moveLeft) velocity.x -= 60.0 * delta;
            if (moveRight) velocity.x += 60.0 * delta;
            controls.moveRight(velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
        }

        if (enemy) {
            const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
            enemy.position.x += dir.x * 0.04;
            enemy.position.z += dir.z * 0.04;
        }
        renderer.render(scene, camera);
        prevTime = time;
    }

    document.addEventListener('keydown', (e) => { if(e.code==='KeyW') moveForward=true; if(e.code==='KeyS') moveBackward=true; if(e.code==='KeyA') moveLeft=true; if(e.code==='KeyD') moveRight=true; });
    document.addEventListener('keyup', (e) => { if(e.code==='KeyW') moveForward=false; if(e.code==='KeyS') moveBackward=false; if(e.code==='KeyA') moveLeft=false; if(e.code==='KeyD') moveRight=false; });
</script>
</body>
</html>
