<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Death Forest - Sound Test</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); z-index: 2000; cursor: pointer; text-align: center;
        }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .battery { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; }
    </style>
</head>
<body>

<div id="instructions">
    <h1>CLICK TO START</h1>
    <p>クリックして視点を動かしてください</p>
    <p style="color: #888; font-size: 12px;">（クリック時にテスト音が鳴るか確認してください）</p>
</div>

<div id="hud">
    <div class="battery">
        <div style="width: 50px; height: 25px; border: 3px solid white; position: relative;">
            <div style="width: 80%; height: 100%; background: white;"></div>
            <div style="position: absolute; right: -8px; top: 5px; width: 5px; height: 10px; background: white;"></div>
        </div>
        <div style="margin-left: 10px; width: 20px; height: 30px; background: white;"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
    // --- 【重要】ここにデータを貼り付けます ---
    // 画像データ (data:image/png;base64,...)
    const HORROR_FACE_BASE64 = "data:image/png;base64,"; 
    
    // 音声データ (data:audio/mpeg;base64,...)
    const SCREAM_AUDIO_BASE64 = "data:audio/mpeg;base64,"; 
    // ---------------------------------------

    let scene, camera, renderer, controls, enemy, listener, positionalAudio;

    // ブラウザの音が出る状態かテストする関数
    function playTestBeep() {
        const ctx = THREE.AudioContext.getContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 440; // 「ラ」の音
        gain.gain.value = 0.1;
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
        console.log("Test beep played");
    }

    document.getElementById('instructions').addEventListener('click', () => {
        if (!scene) init();
        
        // 音声制限を解除
        const context = THREE.AudioContext.getContext();
        if (context.state === 'suspended') {
            context.resume().then(() => playTestBeep());
        } else {
            playTestBeep();
        }
        
        controls.lock();
    });

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2;

        listener = new THREE.AudioListener();
        camera.add(listener);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.PointerLockControls(camera, document.body);
        controls.addEventListener('lock', () => {
            document.getElementById('instructions').style.display = 'none';
        });
        controls.addEventListener('unlock', () => {
            document.getElementById('instructions').style.display = 'flex';
        });

        // ライト
        const light = new THREE.PointLight(0xffffff, 1, 100);
        camera.add(light);
        scene.add(camera);

        // 地面
        const grid = new THREE.GridHelper(200, 20, 0x444444, 0x222222);
        scene.add(grid);

        // 敵の設定（画像があれば表示）
        if (HORROR_FACE_BASE64.length > 30) {
            const texture = new THREE.TextureLoader().load(HORROR_FACE_BASE64);
            enemy = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
            enemy.scale.set(5, 5, 1);
            enemy.position.set(0, 2.5, -20);
            scene.add(enemy);

            // 音声の設定（音声があれば再生）
            if (SCREAM_AUDIO_BASE64.length > 30) {
                positionalAudio = new THREE.PositionalAudio(listener);
                new THREE.AudioLoader().load(SCREAM_AUDIO_BASE64, (buffer) => {
                    positionalAudio.setBuffer(buffer);
                    positionalAudio.setLoop(true);
                    positionalAudio.play();
                });
                enemy.add(positionalAudio);
            }
        }

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
